name: Lead Scraper

on:
  workflow_dispatch:
    inputs:
      service:
        description: '実行するサービス (all / aspic / iimitsu / ittrend / meetsmore)'
        required: true
        default: 'all'

jobs:
  scrape:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Scraper
      env:
        ITTREND_EMAIL:      ${{ secrets.ITTREND_EMAIL }}
        ITTREND_PASSWORD:   ${{ secrets.ITTREND_PASSWORD }}
        IIMITSU_EMAIL:      ${{ secrets.IIMITSU_EMAIL }}
        IIMITSU_PASSWORD:   ${{ secrets.IIMITSU_PASSWORD }}
        ASPIC_EMAIL:        ${{ secrets.ASPIC_EMAIL }}
        ASPIC_PASSWORD:     ${{ secrets.ASPIC_PASSWORD }}
        MEETSMORE_EMAIL:    ${{ secrets.MEETSMORE_EMAIL }}
        MEETSMORE_PASSWORD: ${{ secrets.MEETSMORE_PASSWORD }}
        SF_CLIENT_ID:       ${{ secrets.SF_CLIENT_ID }}
        SF_CLIENT_SECRET:   ${{ secrets.SF_CLIENT_SECRET }}
        SF_INSTANCE_URL:    ${{ secrets.SF_INSTANCE_URL }}
        SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [ "${{ github.event.inputs.service }}" = "all" ]; then
          npx playwright test tests/aspic.spec.ts tests/iimitsu.spec.ts tests/meetsmore.spec.ts --project=chromium
        else
          npx playwright test tests/${{ github.event.inputs.service }}.spec.ts --project=chromium
        fi

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7